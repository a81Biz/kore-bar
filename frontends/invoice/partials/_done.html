<!-- ============================================================
     invoice/partials/_done.html
     Templates: tpl-invoice-done
     ============================================================ -->

<template id="tpl-invoice-done">
    <div class="text-center py-10 animate-fade-in">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-4xl text-green-600">task_alt</span>
        </div>
        <h2 class="text-2xl font-black text-slate-900 mb-2">¡Solicitud Enviada!</h2>
        <p class="text-slate-500 mb-6">
            Tu CFDI para el ticket
            <!-- Folio inyectado con textContent -->
            <strong class="col-folio text-indigo-600 font-mono"></strong>
            ha sido registrado.
        </p>
        <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-5 text-left text-sm text-indigo-800 mb-6 space-y-2">
            <p class="flex items-start gap-2">
                <span class="material-symbols-outlined text-base flex-shrink-0">mail</span>
                Recibirás el XML y PDF por correo electrónico en los próximos minutos.
            </p>
            <p class="flex items-start gap-2">
                <span class="material-symbols-outlined text-base flex-shrink-0">info</span>
                Si no recibes el correo, contacta a la caja del restaurante con tu folio.
            </p>
        </div>
        <button id="btn-new-invoice"
            class="px-8 py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-700 transition-colors">
            Facturar otro ticket
        </button>
    </div>
</template>
