<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SIR Mexican - Sistema de Punto de Venta</title>
    <!-- Tailwind CSS v3 CDN with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/waiters.css">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        mexicanRed: '#D21034',
                        mexicanGreen: '#006341',
                        brandGold: '#C5A059'
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "sans": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden select-none">

    <!-- ViewManager Root Constraint -->
    <div id="app-root" class="h-screen w-full flex flex-col"></div>

    <!-- ========================================== -->
    <!-- TEMPLATES: UI "Lego Pieces"                -->
    <!-- ========================================== -->

    <!-- Template: Login Screen -->
    <template id="tpl-login">
        <section
            class="h-full w-full flex flex-col items-center justify-center mexican-pattern bg-white dark:bg-background-dark fade-in">
            <div class="text-center mb-8">
                <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <span class="material-symbols-outlined text-white text-5xl">restaurant</span>
                </div>
                <h1 class="text-3xl font-bold text-slate-800 dark:text-white">waiters</h1>
                <p class="text-slate-500 dark:text-slate-400">Ingrese su PIN de empleado</p>
            </div>

            <div class="w-full max-w-xs mb-6">
                <select id="employee-select" class="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 font-bold focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Seleccione su nombre...</option>
                </select>
            </div>

            <div class="flex space-x-4 mb-12" id="pin-dots">
                <div
                    class="pin-dot bg-transparent w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600">
                </div>
                <div
                    class="pin-dot bg-transparent w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600">
                </div>
                <div
                    class="pin-dot bg-transparent w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600">
                </div>
                <div
                    class="pin-dot bg-transparent w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full max-w-xs" id="pin-pad">
                <button data-val="1"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">1</button>
                <button data-val="2"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">2</button>
                <button data-val="3"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">3</button>
                <button data-val="4"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">4</button>
                <button data-val="5"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">5</button>
                <button data-val="6"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">6</button>
                <button data-val="7"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">7</button>
                <button data-val="8"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">8</button>
                <button data-val="9"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">9</button>
                <div class="p-4"></div>
                <button data-val="0"
                    class="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-primary dark:hover:border-primary text-2xl font-semibold py-6 rounded-2xl shadow-sm active:scale-95 transition-all text-slate-800 dark:text-white">0</button>
                <button data-val="del"
                    class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-6 rounded-2xl active:scale-95 transition-all flex items-center justify-center">
                    <span class="material-symbols-outlined pointer-events-none">backspace</span>
                </button>
            </div>
        </section>
    </template>

    <!-- Template: Dashboard Screen -->
    <template id="tpl-dashboard">
        <div class="flex-1 overflow-y-auto fade-in">
            <div class="max-w-7xl mx-auto px-4 md:px-8 py-6">
                <header class="flex items-center justify-between border-b border-primary/20 pb-6 mb-8">
                    <div class="flex items-center gap-4">
                        <div class="bg-primary p-2 rounded-lg text-white">
                            <span class="material-symbols-outlined text-3xl">restaurant</span>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold tracking-tight">SIR Mexican</h1>
                            <p class="text-primary font-medium">Dashboard de Servicio</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm text-slate-500 dark:text-slate-400">Mesero</p>
                            <p class="font-bold text-lg">Juan P.</p>
                        </div>
                        <div class="relative group">
                            <img alt="Perfil" class="size-12 rounded-full border-2 border-primary object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdmE9FK6cGkIt86DBTuDCJOs1IefDT_4MbGKGOBWyKCZImAPZsuXesyOwsBzt0n0HCGuLHxem-9r0win176uPRuuddlD3rXoVpZaPXbT80kvuMonHsvFJ6Cpw4EoqNKSr7SU-mtrb4sBRwDTcTb_ppOJyFYO9fRPxa94MXC1caHBAl54sICtdRsSOzyjXxP_JDZQw1h9QaAgSraKRAkl22EmkTSECxWyMvWyAxFLcMgV34zahWwiHCiHlAUxYQMQguAqIYA90XuMnh" />
                            <span
                                class="absolute bottom-0 right-0 size-3 bg-green-500 border-2 border-white dark:border-slate-900 rounded-full"></span>
                        </div>
                        <button id="btn-logout"
                            class="bg-slate-200 dark:bg-slate-800 p-3 rounded-xl hover:bg-primary/10 transition-colors">
                            <span class="material-symbols-outlined align-middle">logout</span>
                        </button>
                    </div>
                </header>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                    <div class="space-y-1">
                        <h2 class="text-3xl font-bold">Gestión de Mesas</h2>
                        <p class="text-slate-500 dark:text-slate-400">Actualizado en tiempo real • <span
                                id="clock-display"></span></p>
                    </div>
                    <div
                        class="flex bg-white dark:bg-slate-800 p-1 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                        <button
                            class="px-6 py-2.5 rounded-lg bg-primary text-white font-bold text-sm shadow-md">Todas</button>
                        <button
                            class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 font-bold text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">Mis
                            Mesas</button>
                        <button
                            class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 font-bold text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">Zonas</button>
                    </div>
                </div>

                <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
                    <div
                        class="flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 whitespace-nowrap">
                        <span class="size-3 rounded-full bg-slate-300 dark:bg-slate-600"></span>
                        <span class="text-xs font-bold uppercase tracking-wider">Libre</span>
                    </div>
                    <div
                        class="flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 whitespace-nowrap">
                        <span class="size-3 rounded-full bg-green-500"></span>
                        <span class="text-xs font-bold uppercase tracking-wider">Ocupada</span>
                    </div>
                    <div
                        class="flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 whitespace-nowrap">
                        <span class="size-3 rounded-full bg-yellow-400"></span>
                        <span class="text-xs font-bold uppercase tracking-wider">Esperando Cuenta</span>
                    </div>
                </div>

                <!-- Dynamic Render Box -->
                <div id="tables-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-12">
                    <!-- Populated via Javascript -->
                </div>

                <section
                    class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-200 dark:border-slate-700">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">bolt</span>
                        Acciones Rápidas
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button id="btn-quick-order"
                            class="flex items-center justify-center gap-3 bg-primary text-white py-5 rounded-xl font-bold shadow-lg shadow-primary/20 hover:brightness-110 transition-all">
                            <span class="material-symbols-outlined">add_circle</span> NUEVA ORDEN
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-5 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                            <span class="material-symbols-outlined">menu_book</span> VER MENÚ
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-5 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                            <span class="material-symbols-outlined">notifications_active</span> LLAMAR HOST
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-5 rounded-xl font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                            <span class="material-symbols-outlined">cleaning_services</span> SOLICITAR LIMPIEZA
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </template>

    <!-- Template: POS Order Screen -->
    <template id="tpl-order">
        <div class="flex h-screen w-full flex-col overflow-hidden fade-in relative">

            <div id="notification-banner"
                class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-mexicanGreen text-white px-8 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-3 animate-bounce">
                <span class="material-symbols-outlined">check_circle</span>
                <span class="font-bold">Orden enviada con éxito</span>
            </div>

            <header
                class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark/50 px-6 py-3 shrink-0">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 text-primary cursor-pointer" id="btn-home">
                        <span class="material-symbols-outlined text-3xl">restaurant_menu</span>
                        <h2 class="text-xl font-bold leading-tight tracking-tight hidden md:block">SIR Mexican</h2>
                    </div>
                    <div class="relative w-64">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                        <input
                            class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary/50 transition-all"
                            placeholder="Buscar platillo..." type="text" />
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-xl">
                        <span class="material-symbols-outlined text-primary text-sm">person</span>
                        <span class="text-sm font-medium">Juan P.</span>
                    </div>
                    <button id="btn-close-order"
                        class="flex items-center justify-center rounded-xl h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </header>

            <main class="flex flex-1 overflow-hidden">
                <section
                    class="flex flex-[0.7] flex-col bg-background-light dark:bg-background-dark p-6 overflow-y-auto w-full max-w-[70%]">
                    <div class="flex gap-3 mb-6 shrink-0 overflow-x-auto pb-2" id="category-tabs">
                        <!-- Filled by JS -->
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="menu-grid">
                        <!-- Filled by JS -->
                    </div>
                </section>

                <aside
                    class="flex-[0.3] flex flex-col bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 overflow-hidden min-w-[30%]">
                    <div class="p-6 border-b border-slate-100 dark:border-slate-800">
                        <div class="flex items-center justify-between mb-1">
                            <h2 class="text-xl font-bold" id="cart-table-label">Mesa</h2>
                            <span
                                class="px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded-lg uppercase">Nueva
                                Comanda</span>
                        </div>
                        <p class="text-xs text-slate-500 dark:text-slate-400" id="cart-time"></p>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 space-y-4" id="cart-items-container">
                        <!-- Repainted per state map -->
                        <div class="h-full flex flex-col items-center justify-center text-slate-300 dark:text-slate-700 italic text-center"
                            id="empty-cart-state">
                            <span class="material-symbols-outlined text-6xl mb-2">shopping_basket</span>
                            <p>La orden está vacía</p>
                        </div>
                    </div>

                    <div class="p-6 bg-slate-50 dark:bg-slate-800/50 space-y-3">
                        <div class="flex justify-between text-sm text-slate-600 dark:text-slate-400">
                            <span>Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-slate-600 dark:text-slate-400">
                            <span>IVA (16%)</span>
                            <span id="cart-tax">$0.00</span>
                        </div>
                        <div
                            class="flex justify-between text-xl font-bold pt-2 border-t border-slate-200 dark:border-slate-700">
                            <span>Total</span>
                            <span class="text-primary" id="cart-total">$0.00</span>
                        </div>
                        <button id="btn-send-kitchen" disabled
                            class="w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 mt-4 active:scale-[0.98] transition-all bg-slate-300 dark:bg-slate-700 text-slate-500 cursor-not-allowed">
                            <span class="material-symbols-outlined">send</span> Enviar a Cocina
                        </button>
                        <button id="btn-pay-close"
                            class="w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 mt-3 active:scale-[0.98] transition-all bg-green-500 hover:bg-green-600 text-white shadow-green-500/30">
                            <span class="material-symbols-outlined">payments</span> Cobrar y Cerrar
                        </button>
                    </div>
                </aside>
            </main>
        </div>
    </template>

    <!-- ES6 Modules Entry Point -->
    <script type="module" src="./js/app.js"></script>
    <script type="module" src="/core/js/kore.core.js"></script>
</body>

</html>
