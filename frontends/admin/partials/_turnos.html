<!-- Template principal: Turnos y Asistencia -->
<template id="tpl-admin-turnos">
    <div class="min-h-screen bg-slate-50 text-slate-800 w-full flex flex-col fade-in">

        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0 shadow-sm">
            <div class="flex items-center gap-4">
                <span class="text-2xl">🕐</span>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Turnos y Asistencia</h1>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-[1400px] mx-auto w-full">

                <!-- Tabs — 5 pestañas -->
                <div class="flex border-b border-slate-200 mb-6 overflow-x-auto no-scrollbar">
                    <button id="tab-monitor"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 bg-white transition-colors whitespace-nowrap">
                        📡 Monitor en Vivo
                    </button>
                    <button id="tab-historial"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
                        📋 Historial
                    </button>
                    <button id="tab-turnos"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
                        🗓️ Catálogo de Turnos
                    </button>
                    <button id="tab-horarios"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
                        📅 Horarios de Personal
                    </button>
                    <button id="tab-seguridad"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">
                        🔐 Seguridad / PIN
                    </button>
                </div>

                <!-- ══ MONITOR EN VIVO ═══════════════════════════════════════ -->
                <div id="view-monitor" class="flex flex-col gap-6">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div class="flex gap-3 flex-wrap">
                            <div
                                class="bg-white border border-slate-200 rounded-xl px-5 py-3 shadow-sm text-center min-w-[90px]">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total</p>
                                <p id="kpi-total" class="text-3xl font-black text-slate-800">—</p>
                            </div>
                            <div
                                class="bg-white border border-emerald-200 rounded-xl px-5 py-3 shadow-sm text-center min-w-[90px]">
                                <p class="text-xs font-bold text-emerald-500 uppercase tracking-wider">Presente</p>
                                <p id="kpi-presente" class="text-3xl font-black text-emerald-600">—</p>
                            </div>
                            <div
                                class="bg-white border border-amber-200 rounded-xl px-5 py-3 shadow-sm text-center min-w-[90px]">
                                <p class="text-xs font-bold text-amber-500 uppercase tracking-wider">Esperado</p>
                                <p id="kpi-esperado" class="text-3xl font-black text-amber-600">—</p>
                            </div>
                            <div
                                class="bg-white border border-red-200 rounded-xl px-5 py-3 shadow-sm text-center min-w-[90px]">
                                <p class="text-xs font-bold text-red-400 uppercase tracking-wider">Ausente</p>
                                <p id="kpi-ausente" class="text-3xl font-black text-red-500">—</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <input type="date" id="monitor-date"
                                class="px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 bg-white font-mono">
                            <button id="btn-refresh-monitor"
                                class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition-colors shadow-sm">
                                <span class="material-symbols-outlined text-[16px]">refresh</span>
                                Actualizar
                            </button>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead
                                    class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-4 py-3">Empleado</th>
                                        <th class="px-4 py-3">Núm. Empleado</th>
                                        <th class="px-4 py-3">Turno</th>
                                        <th class="px-4 py-3">Zona / Piso</th>
                                        <th class="px-4 py-3">Horario</th>
                                        <th class="px-4 py-3 text-center">Estado</th>
                                        <th class="px-4 py-3">Check-in</th>
                                        <th class="px-4 py-3">Fuente</th>
                                        <th class="px-4 py-3 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="table-monitor-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ══ HISTORIAL ═════════════════════════════════════════════ -->
                <div id="view-historial" class="hidden flex flex-col gap-6">

                    <!-- Filtros + botón buscar -->
                    <div
                        class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex flex-wrap gap-4 items-end">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">DESDE</label>
                            <input type="date" id="hist-start" class="px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none
                       focus:ring-2 focus:ring-indigo-500 bg-white font-mono">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">HASTA</label>
                            <input type="date" id="hist-end" class="px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none
                       focus:ring-2 focus:ring-indigo-500 bg-white font-mono">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">NÚM. EMPLEADO (opcional)</label>
                            <input type="text" id="hist-employee" placeholder="Ej. E-001" class="px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none
                       focus:ring-2 focus:ring-indigo-500 font-mono w-40">
                        </div>
                        <button id="btn-search-historial" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-bold
                   px-5 py-2 rounded-lg transition-colors shadow-sm">
                            Buscar
                        </button>
                    </div>

                    <!-- KPIs resumen del período -->
                    <div id="hist-summary" class="hidden grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Empleados</p>
                            <p id="hist-kpi-employees" class="text-2xl font-black text-slate-800">—</p>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Días Asignados</p>
                            <p id="hist-kpi-total" class="text-2xl font-black text-slate-800">—</p>
                        </div>
                        <div class="bg-white border border-emerald-200 rounded-xl p-4 text-center shadow-sm">
                            <p class="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-1">Laborados</p>
                            <p id="hist-kpi-worked" class="text-2xl font-black text-emerald-600">—</p>
                        </div>
                        <div class="bg-white border border-indigo-200 rounded-xl p-4 text-center shadow-sm">
                            <p class="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">A Pagar</p>
                            <p id="hist-kpi-payable" class="text-2xl font-black text-indigo-600">—</p>
                        </div>
                        <div class="bg-white border border-red-200 rounded-xl p-4 text-center shadow-sm">
                            <p class="text-xs font-bold text-red-400 uppercase tracking-wider mb-1">Descuentos</p>
                            <p id="hist-kpi-deductions" class="text-2xl font-black text-red-500">—</p>
                        </div>
                    </div>

                    <!-- Lista de empleados con días -->
                    <div id="hist-employees-list" class="space-y-3">
                        <div class="p-8 text-center text-slate-400 text-sm bg-white rounded-xl border border-slate-200">
                            Selecciona un rango de fechas y presiona Buscar.
                        </div>
                    </div>

                    <!-- Panel de exportación -->
                    <div id="hist-export-panel"
                        class="hidden bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center gap-2">
                            <span class="material-symbols-outlined text-indigo-600">send_to_mobile</span>
                            <h3 class="font-bold text-slate-800">Exportar a RRHH</h3>
                        </div>
                        <div class="p-5 flex flex-col md:flex-row gap-4 items-end">

                            <!-- CSV descarga directa -->
                            <div class="flex-1">
                                <p class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">
                                    Descarga local (CSV)
                                </p>
                                <button id="btn-download-csv" class="w-full flex items-center justify-center gap-2 bg-emerald-600
                           hover:bg-emerald-700 text-white font-bold text-sm px-5 py-2.5
                           rounded-lg transition-colors shadow-sm">
                                    <span class="material-symbols-outlined text-[18px]">download</span>
                                    Descargar CSV
                                </button>
                            </div>

                            <div class="flex items-center justify-center text-slate-300 font-bold">ó</div>

                            <!-- Envío a URL de RRHH -->
                            <div class="flex-[2]">
                                <p class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">
                                    Enviar a Sistema RRHH (JSON POST)
                                </p>
                                <div class="flex gap-2">
                                    <input type="url" id="input-rrhh-url"
                                        placeholder="https://rrhh.empresa.com/api/nomina" class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg
                               outline-none focus:ring-2 focus:ring-indigo-500 font-mono">
                                    <button id="btn-send-rrhh" class="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700
                               text-white font-bold text-sm px-4 py-2 rounded-lg
                               transition-colors shadow-sm whitespace-nowrap">
                                        <span class="material-symbols-outlined text-[18px]">send</span>
                                        Enviar
                                    </button>
                                </div>
                                <p class="text-[11px] text-slate-400 mt-1">
                                    Se enviará un POST con el JSON de nómina al endpoint indicado.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ══ CATÁLOGO DE TURNOS ════════════════════════════════════ -->
                <div id="view-turnos" class="hidden flex flex-col gap-6">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex-1">
                            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <span class="material-symbols-outlined text-indigo-600">add_circle</span>
                                Nuevo Turno
                            </h3>
                            <form id="form-admin-turno" class="flex flex-col gap-4">
                                <div class="flex gap-4 flex-wrap">
                                    <div class="flex-1 min-w-[120px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">CÓDIGO</label>
                                        <input type="text" id="turno-code" required placeholder="MATUTINO"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg uppercase font-mono outline-none focus:ring-2 focus:ring-indigo-500">
                                    </div>
                                    <div class="flex-[2] min-w-[160px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">NOMBRE</label>
                                        <input type="text" id="turno-name" required placeholder="Turno Matutino"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                                    </div>
                                </div>
                                <div class="flex gap-4 flex-wrap">
                                    <div class="flex-1 min-w-[120px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">HORA INICIO</label>
                                        <input type="time" id="turno-start" required
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-mono">
                                    </div>
                                    <div class="flex-1 min-w-[120px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">HORA FIN</label>
                                        <input type="time" id="turno-end" required
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-mono">
                                    </div>
                                </div>
                                <div class="flex justify-end">
                                    <button type="submit"
                                        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-6 py-2 rounded-lg transition-colors shadow-sm">
                                        Crear Turno
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-xl shadow-sm flex-1 overflow-hidden">
                            <div class="p-4 border-b border-slate-100">
                                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-slate-500">schedule</span>
                                    Turnos Registrados
                                </h3>
                            </div>
                            <ul id="list-turnos" class="divide-y divide-slate-100 max-h-80 overflow-y-auto"></ul>
                        </div>
                    </div>
                </div>

                <!-- ══ HORARIOS DE PERSONAL ══════════════════════════════════
                     Container vacío — HorariosController clona tpl-admin-horarios aquí.
                     No añadir nada aquí manualmente.
                ════════════════════════════════════════════════════════════ -->
                <div id="view-horarios" class="hidden"></div>

                <!-- ══ SEGURIDAD / RESET PIN ═════════════════════════════════ -->
                <div id="view-seguridad" class="hidden flex justify-center">
                    <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm w-full max-w-md">
                        <h3 class="font-bold text-slate-800 mb-2 flex items-center gap-2 text-lg">
                            <span class="material-symbols-outlined text-red-500">lock_reset</span>
                            Restablecer PIN de Empleado
                        </h3>
                        <p class="text-sm text-slate-500 mb-6">Sobreescribe el PIN del empleado. La acción es inmediata
                            e irreversible.</p>
                        <form id="form-reset-pin" class="flex flex-col gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">NÚM. EMPLEADO</label>
                                <input type="text" id="pin-employee-number" required placeholder="Ej. 80219601"
                                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg font-mono outline-none focus:ring-2 focus:ring-red-400">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">NUEVO PIN (4–6
                                    dígitos)</label>
                                <input type="password" id="pin-new-value" required placeholder="••••" maxlength="6"
                                    pattern="\d{4,6}"
                                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg font-mono text-lg tracking-widest outline-none focus:ring-2 focus:ring-red-400">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">CONFIRMAR PIN</label>
                                <input type="password" id="pin-confirm-value" required placeholder="••••" maxlength="6"
                                    pattern="\d{4,6}"
                                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg font-mono text-lg tracking-widest outline-none focus:ring-2 focus:ring-red-400">
                            </div>
                            <button type="submit"
                                class="mt-2 bg-red-600 hover:bg-red-700 text-white text-sm font-bold px-6 py-2.5 rounded-lg transition-colors shadow-sm w-full">
                                🔐 Restablecer PIN
                            </button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
        <template id="tpl-modal-checkin">
            <!-- Overlay -->
            <div id="modal-checkin" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4
               opacity-0 pointer-events-none transition-opacity duration-200">
                <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col
                    transform scale-95 transition-transform duration-200">

                    <!-- Header -->
                    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <span class="material-symbols-outlined text-emerald-600 text-xl">how_to_reg</span>
                            Registrar Llegada
                        </h3>
                        <button id="btn-close-checkin" class="text-slate-400 hover:text-red-500 transition-colors p-1">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <!-- Body -->
                    <div class="p-6 space-y-4">
                        <div class="bg-emerald-50 border border-emerald-100 rounded-lg p-4 flex items-start gap-3">
                            <span class="material-symbols-outlined text-emerald-600 text-2xl mt-0.5">badge</span>
                            <div>
                                <p id="checkin-nombre" class="font-bold text-slate-800 text-base"></p>
                                <p id="checkin-employee-number" class="text-xs text-slate-500 font-mono mt-0.5"></p>
                            </div>
                        </div>

                        <p class="text-sm text-slate-600">
                            Se registrará la llegada con hora actual.
                            La fuente quedará marcada como
                            <span
                                class="font-bold text-indigo-700 bg-indigo-50 px-1.5 py-0.5 rounded text-xs">ADMIN</span>.
                        </p>

                        <div class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 flex items-center gap-3">
                            <span class="material-symbols-outlined text-slate-400">schedule</span>
                            <div>
                                <p class="text-xs text-slate-500">Hora de llegada</p>
                                <p id="checkin-hora" class="font-mono font-bold text-slate-800 text-lg"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="px-6 pb-6 flex gap-3">
                        <button id="btn-cancel-checkin" class="flex-1 px-4 py-2 text-sm font-bold text-slate-600
                           hover:bg-slate-100 rounded-lg transition-colors border border-slate-200">
                            Cancelar
                        </button>
                        <button id="btn-confirm-checkin" class="flex-1 px-4 py-2 text-sm font-bold bg-emerald-600
                           hover:bg-emerald-700 text-white rounded-lg transition-colors shadow-sm
                           flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">check_circle</span>
                            Confirmar Check-in
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>

<!-- ══ TEMPLATE: modal de descuento ════════════════════════ -->
<template id="tpl-modal-deduction">
    <div id="modal-deduction" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4
               opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col
                    transform scale-95 transition-transform duration-200">

            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <span class="material-symbols-outlined text-orange-500 text-xl">receipt_long</span>
                    Aplicar Descuento de Nómina
                </h3>
                <button id="btn-close-deduction" class="text-slate-400 hover:text-red-500 transition-colors p-1">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="p-6 space-y-4">
                <!-- Info del día -->
                <div class="bg-orange-50 border border-orange-100 rounded-lg p-3">
                    <p id="deduction-emp-nombre" class="font-bold text-slate-800 text-sm"></p>
                    <p id="deduction-work-date" class="text-xs text-slate-500 font-mono mt-0.5"></p>
                </div>

                <!-- Tipo de descuento -->
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">
                        Tipo de descuento <span class="text-red-500">*</span>
                    </label>
                    <select id="select-deduction-type" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg
                               bg-white outline-none focus:ring-2 focus:ring-orange-400">
                        <option value="">Selecciona un tipo...</option>
                        <option value="FALTA_INJUSTIFICADA">Falta injustificada</option>
                        <option value="RETARDO">Retardo</option>
                        <option value="PERMISO_SIN_GOCE">Permiso sin goce de sueldo</option>
                        <option value="DIA_ECONOMICO">Día económico</option>
                        <option value="SUSPENSION">Suspensión disciplinaria</option>
                        <option value="SANCION">Sanción económica</option>
                    </select>
                </div>

                <!-- Motivo -->
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1.5">
                        Motivo / Observación <span class="text-red-500">*</span>
                    </label>
                    <textarea id="input-deduction-motivo" rows="3"
                        placeholder="Describe el motivo del descuento para el expediente..." class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg
                               outline-none focus:ring-2 focus:ring-orange-400 resize-none"></textarea>
                </div>

                <!-- Nota informativa según tipo -->
                <div id="deduction-type-note" class="hidden text-xs p-3 rounded-lg border">
                </div>
            </div>

            <div class="px-6 pb-6 flex gap-3">
                <button id="btn-cancel-deduction" class="flex-1 px-4 py-2 text-sm font-bold text-slate-600
                           hover:bg-slate-100 rounded-lg transition-colors border border-slate-200">
                    Cancelar
                </button>
                <button id="btn-confirm-deduction" class="flex-1 px-4 py-2 text-sm font-bold bg-orange-600
                           hover:bg-orange-700 text-white rounded-lg transition-colors shadow-sm
                           flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">save</span>
                    Guardar Descuento
                </button>
            </div>
        </div>
    </div>
</template>
