<template id="tpl-admin-inventario">
    <div class="min-h-screen bg-slate-50 text-slate-800 w-full flex flex-col fade-in">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-6 shrink-0 shadow-sm">
            <div class="flex items-center gap-4">
                <span class="text-2xl">📦</span>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Inventario y Proveedores</h1>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-[1400px] mx-auto w-full">

                <div class="flex border-b border-slate-200 mb-6">
                    <button id="tab-suppliers"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 bg-white transition-colors">
                        🚚 Catálogo de Proveedores
                    </button>
                    <button id="tab-stock"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors">
                        ⚖️ Existencias y Resurtido
                    </button>
                    <button id="tab-kardex"
                        class="px-6 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors">
                        📋 Historial (Kardex)
                    </button>
                </div>

                <div
                    class="relative bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px]">

                    <div id="view-suppliers" class="absolute inset-0 flex flex-col md:flex-row">
                        <div
                            class="w-full md:w-1/3 border-r border-slate-200 bg-slate-50 flex flex-col relative z-30 shadow-[4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-white">
                                <h3 class="font-bold text-slate-800">Proveedores</h3>
                                <button id="btn-new-supplier"
                                    class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-md font-bold hover:bg-indigo-100 transition-colors">
                                    + Nuevo Proveedor
                                </button>
                            </div>
                            <div class="p-3 border-b border-slate-200 bg-slate-50/50">
                                <input type="text" id="search-supplier" placeholder="Buscar proveedor..."
                                    class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div class="flex-1 overflow-y-auto p-3 space-y-2" id="list-suppliers"></div>
                        </div>

                        <div class="w-full md:w-2/3 flex flex-col relative bg-white" id="panel-supplier-details">
                            <div id="supplier-lock-overlay"
                                class="absolute inset-0 bg-white/90 backdrop-blur-sm z-30 flex flex-col items-center justify-center transition-opacity duration-300">
                                <span class="material-symbols-outlined text-5xl text-slate-300 mb-3">storefront</span>
                                <p class="text-slate-500 font-bold text-lg">Selecciona un proveedor</p>
                                <p class="text-slate-400 text-sm">O crea uno nuevo para gestionar sus productos</p>
                            </div>

                            <div class="p-6 border-b border-slate-100 bg-white relative z-20">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="material-symbols-outlined text-indigo-600">local_shipping</span>
                                    <h4 class="font-bold text-slate-800 text-lg">Perfil Comercial</h4>
                                </div>
                                <form id="form-inv-supplier" class="flex flex-wrap gap-4 items-end">
                                    <input type="hidden" id="sup-id">
                                    <div class="w-32">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">CÓDIGO</label>
                                        <input type="text" id="sup-code"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg uppercase font-mono outline-none focus:border-indigo-500"
                                            placeholder="Ej. PRV-01" required>
                                    </div>
                                    <div class="w-1/3 min-w-[150px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">RAZÓN SOCIAL</label>
                                        <input type="text" id="sup-name"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                            required>
                                    </div>
                                    <div class="flex-1 min-w-[150px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">INFO CONTACTO</label>
                                        <input type="text" id="sup-contact"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                            placeholder="Tel o Email (Opcional)">
                                    </div>
                                    <div>
                                        <button type="submit"
                                            class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-bold px-6 py-2 rounded-lg transition-colors shadow-sm">
                                            Guardar Perfil
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div class="p-6 bg-slate-50/50 border-b border-slate-200 relative">
                                <div id="products-lock-overlay"
                                    class="absolute inset-0 bg-slate-50/90 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center hidden">
                                    <span class="material-symbols-outlined text-2xl text-slate-400 mb-1">save</span>
                                    <p class="text-slate-600 font-bold text-sm">Guarda el perfil del proveedor primero
                                    </p>
                                </div>

                                <h4 class="text-sm font-bold text-slate-700 mb-3">Vincular Producto / Costo</h4>
                                <form id="form-supplier-price" class="flex flex-wrap gap-3 items-end">
                                    <div class="w-32">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">CÓD. INSUMO</label>
                                        <input type="text" id="link-item-code"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg uppercase font-mono focus:ring-2 focus:ring-indigo-500"
                                            placeholder="Ej. TOMATE" required>
                                    </div>
                                    <div class="flex-1 min-w-[150px]">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">NOMBRE</label>
                                        <input type="text" id="link-item-name"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg bg-white"
                                            placeholder="Ej. Tomate Saladet" required>
                                    </div>
                                    <div class="w-24">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">UNIDAD</label>
                                        <select id="link-item-unit"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-indigo-500">
                                            <option value="KG">KG</option>
                                            <option value="L">L</option>
                                            <option value="PZ">PZ</option>
                                            <option value="GR">GR</option>
                                            <option value="ML">ML</option>
                                        </select>
                                    </div>
                                    <div class="w-28">
                                        <label class="block text-xs font-bold text-slate-500 mb-1">COSTO ($)</label>
                                        <input type="number" step="0.01" min="0.01" id="link-item-price"
                                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg text-right font-mono"
                                            placeholder="0.00" required>
                                    </div>
                                    <div>
                                        <button type="submit"
                                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm">
                                            Añadir
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div class="flex-1 overflow-y-auto p-6 bg-white relative">
                                <table class="w-full text-sm text-left">
                                    <thead class="text-xs text-slate-400 uppercase border-b border-slate-100">
                                        <tr>
                                            <th class="pb-3 font-semibold">Cód. Insumo</th>
                                            <th class="pb-3 font-semibold">Descripción</th>
                                            <th class="pb-3 text-right font-semibold">Costo Pactado</th>
                                            <th class="pb-3 text-right font-semibold">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-supplier-prices-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="view-stock" class="absolute inset-0 flex flex-col p-6 hidden">

                        <!-- Cabecera con toggle sugerencias y sync -->
                        <div class="flex flex-wrap justify-between items-center gap-4 mb-4 shrink-0">
                            <h3 class="font-bold text-slate-800 text-lg">Existencias y Resurtido</h3>
                            <div class="flex items-center gap-3">
                                <button id="btn-sync-purchases"
                                    class="cursor-pointer text-xs bg-indigo-50 border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-md font-bold hover:bg-indigo-100 transition-colors flex items-center gap-1.5 shadow-sm">
                                    <span class="material-symbols-outlined text-[16px]">sync</span>
                                    Sincronizar Compras a Bodega
                                </button>
                                <label
                                    class="flex items-center gap-2 cursor-pointer bg-slate-100 px-4 py-2 rounded-lg border border-slate-200">
                                    <input type="checkbox" id="toggle-suggested"
                                        class="w-4 h-4 text-indigo-600 rounded">
                                    <span class="text-sm font-bold text-slate-700">Ver solo sugerencias de compra</span>
                                </label>
                            </div>
                        </div>

                        <!-- Split: Bodega | Cocina -->
                        <div id="stock-split-grid" class="flex-1 grid grid-cols-2 gap-4 overflow-hidden min-h-0">

                            <!-- ── PANEL BODEGA ── -->
                            <div class="flex flex-col border border-slate-200 rounded-xl overflow-hidden bg-white">
                                <div
                                    class="px-4 py-3 bg-indigo-50 border-b border-indigo-100 flex items-center gap-2 shrink-0">
                                    <span class="material-symbols-outlined text-indigo-600 text-lg">warehouse</span>
                                    <h4 class="font-bold text-indigo-800 text-sm uppercase tracking-wide">📦 Bodega
                                        Principal</h4>
                                    <span
                                        class="ml-auto text-[10px] font-mono bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded">LOC-BODEGA</span>
                                </div>
                                <div class="flex-1 overflow-y-auto">
                                    <table class="w-full text-sm text-left">
                                        <thead
                                            class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                            <tr>
                                                <th class="px-3 py-2">Código</th>
                                                <th class="px-3 py-2">Descripción</th>
                                                <th class="px-3 py-2 text-right">Stock</th>
                                                <th class="px-3 py-2 text-center">Estado</th>
                                                <th class="px-3 py-2 text-right">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody id="table-stock-bodega-body"></tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- ── PANEL COCINA ── -->
                            <div class="flex flex-col border border-slate-200 rounded-xl overflow-hidden bg-white">
                                <div
                                    class="px-4 py-3 bg-orange-50 border-b border-orange-100 flex items-center gap-2 shrink-0">
                                    <span class="material-symbols-outlined text-orange-600 text-lg">soup_kitchen</span>
                                    <h4 class="font-bold text-orange-800 text-sm uppercase tracking-wide">🍳 Cocina</h4>
                                    <span
                                        class="ml-auto text-[10px] font-mono bg-orange-100 text-orange-600 px-2 py-0.5 rounded">LOC-COCINA</span>
                                </div>
                                <div class="flex-1 overflow-y-auto">
                                    <table class="w-full text-sm text-left">
                                        <thead
                                            class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                            <tr>
                                                <th class="px-3 py-2">Código</th>
                                                <th class="px-3 py-2">Descripción</th>
                                                <th class="px-3 py-2 text-right">Stock</th>
                                                <th class="px-3 py-2 text-center">Estado</th>
                                                <th class="px-3 py-2 text-right">Ajustar</th>
                                            </tr>
                                        </thead>
                                        <tbody id="table-stock-cocina-body"></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>

                        <!-- Panel de Pedido de Compra (visible cuando toggle está activo) -->
                        <div id="panel-purchase-orders" class="hidden flex-1 flex flex-col min-h-0">

                            <!-- Estado vacío -->
                            <div id="purchase-orders-empty" class="flex flex-col items-center justify-center flex-1 text-center py-16">
                                <span class="material-symbols-outlined text-5xl text-slate-300 block mb-3">pending_actions</span>
                                <p class="font-bold text-slate-500">Sin pedido enviado</p>
                                <p class="text-sm text-slate-400 mt-1">La cocina aún no ha enviado ningún pedido. El pedido aparece aquí cuando la cocina lo revisa y lo confirma.</p>
                            </div>

                            <!-- Cabecera del pedido activo -->
                            <div id="purchase-order-header" class="hidden shrink-0 flex flex-wrap justify-between items-start gap-4 mb-3">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <h4 class="font-bold text-slate-800 text-base">📋 Pedido de Compra</h4>
                                        <span id="po-status-badge" class="px-2 py-0.5 text-[10px] font-bold rounded tracking-wider"></span>
                                    </div>
                                    <p class="text-xs text-slate-500 mt-0.5" id="po-meta"></p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button id="btn-print-order"
                                        class="flex items-center gap-1.5 px-4 py-2 text-sm font-bold text-slate-700 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors shadow-sm">
                                        <span class="material-symbols-outlined text-[16px]">print</span> Imprimir PDF
                                    </button>
                                    <button id="btn-confirm-order"
                                        class="flex items-center gap-1.5 px-4 py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50">
                                        <span class="material-symbols-outlined text-[16px]">check_circle</span> Confirmar Pedido
                                    </button>
                                </div>
                            </div>

                            <!-- Tabla de insumos del pedido -->
                            <div id="purchase-order-table-wrap" class="hidden flex-1 overflow-y-auto border border-slate-200 rounded-xl min-h-0">
                                <table class="w-full text-sm text-left">
                                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                        <tr>
                                            <th class="px-3 py-2">Origen</th>
                                            <th class="px-3 py-2">Insumo</th>
                                            <th class="px-3 py-2">Proveedor</th>
                                            <th class="px-3 py-2 text-right">Pedido</th>
                                            <th class="px-3 py-2 text-right">Recibido</th>
                                            <th class="px-3 py-2 text-right">Faltante</th>
                                            <th class="px-3 py-2 text-right">Precio Unit.</th>
                                            <th class="px-3 py-2 text-center">Quitar</th>
                                        </tr>
                                    </thead>
                                    <tbody id="po-items-body" class="divide-y divide-slate-100"></tbody>
                                </table>
                            </div>

                            <!-- Formulario agregar insumo (solo visible en DRAFT) -->
                            <form id="form-add-po-item" class="hidden shrink-0 mt-3 bg-slate-50 border border-slate-200 rounded-lg p-3 flex flex-wrap gap-2 items-end">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Cód. Insumo</label>
                                    <input type="text" id="po-add-item-code" placeholder="Ej. TOMATE"
                                        class="w-28 px-2 py-1.5 text-sm border border-slate-300 rounded uppercase font-mono outline-none focus:ring-2 focus:ring-indigo-500" required>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Cód. Proveedor</label>
                                    <input type="text" id="po-add-supplier-code" placeholder="PRV-01 (opc.)"
                                        class="w-28 px-2 py-1.5 text-sm border border-slate-300 rounded uppercase font-mono outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Cantidad</label>
                                    <input type="number" step="0.01" min="0.01" id="po-add-qty" placeholder="0.00"
                                        class="w-24 px-2 py-1.5 text-sm border border-slate-300 rounded text-right font-mono outline-none focus:ring-2 focus:ring-indigo-500" required>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Precio Unit.</label>
                                    <input type="number" step="0.01" min="0" id="po-add-price" placeholder="0.00"
                                        class="w-24 px-2 py-1.5 text-sm border border-slate-300 rounded text-right font-mono outline-none focus:ring-2 focus:ring-indigo-500">
                                </div>
                                <button type="submit"
                                    class="px-4 py-1.5 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                                    + Agregar
                                </button>
                            </form>
                        </div>

                    </div>

                    <div id="view-kardex" class="absolute inset-0 flex flex-col p-6 hidden">

                        <!-- Historial de Pedidos de Compra -->
                        <div id="panel-order-history" class="mb-4 hidden">
                            <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                                <span class="material-symbols-outlined text-base text-indigo-600">receipt_long</span>
                                Pedidos de Compra Enviados
                            </h4>
                            <div id="list-order-history" class="space-y-2 max-h-64 overflow-y-auto"></div>
                        </div>

                        <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
                            <h3 class="font-bold text-slate-800 text-lg">Historial de Movimientos (Kardex)</h3>
                            <div class="flex items-center gap-3">
                                <select id="kardex-location-filter"
                                    class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg outline-none bg-white focus:ring-2 focus:ring-indigo-500">
                                    <option value="">Todas las ubicaciones</option>
                                    <option value="LOC-BODEGA">Bodega Principal</option>
                                    <option value="LOC-COCINA">Cocina</option>
                                </select>
                                <input type="text" id="kardex-item-filter" placeholder="Buscar insumo..."
                                    class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 w-48 uppercase">
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto border border-slate-200 rounded-lg">
                            <table class="w-full text-sm text-left">
                                <thead
                                    class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-4 py-3">Fecha y Hora</th>
                                        <th class="px-4 py-3">Tipo</th>
                                        <th class="px-4 py-3">Origen</th>
                                        <th class="px-4 py-3">Destino</th>
                                        <th class="px-4 py-3">Insumo</th>
                                        <th class="px-4 py-3 text-right">Cant.</th>
                                        <th class="px-4 py-3">Referencia</th>
                                    </tr>
                                </thead>
                                <tbody id="table-kardex-body"></tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- MODAL: TRASPASO -->
        <div id="modal-transfer"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
            <div
                class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform scale-95 transition-transform duration-200">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <span class="material-symbols-outlined text-indigo-600 text-xl">move_up</span> Traspasar Insumo
                    </h3>
                    <button class="btn-close-transfer text-slate-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <form id="form-transfer" class="p-6 flex flex-col gap-4">
                    <input type="hidden" id="trans-item-code">
                    <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3">
                        <p class="text-xs font-bold text-indigo-800 uppercase" id="trans-item-name"></p>
                        <p class="text-[10px] text-indigo-600 font-mono mt-1">Ubicación Actual: <span
                                id="trans-source-loc" class="font-bold"></span></p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Destino</label>
                        <select id="trans-target-loc" required
                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                            <option value="">Selecciona destino...</option>
                            <option value="LOC-COCINA" selected>Cocina</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Cantidad a Traspasar (<span
                                id="trans-item-unit"></span>)</label>
                        <input type="number" step="0.01" min="0.01" id="trans-qty" required
                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-right font-mono text-lg font-bold text-indigo-600">
                    </div>
                    <div class="mt-4 flex justify-end gap-2">
                        <button type="button"
                            class="btn-close-transfer px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">Cancelar</button>
                        <button type="submit"
                            class="px-4 py-2 text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg shadow-sm transition-colors">Confirmar
                            Traspaso</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL: AJUSTE FÍSICO (MERMA) -->
        <div id="modal-adjustment"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
            <div
                class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform scale-95 transition-transform duration-200">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <span class="material-symbols-outlined text-orange-600 text-xl">balance</span> Ajuste Físico
                    </h3>
                    <button class="btn-close-adjustment text-slate-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <form id="form-adjustment" class="p-6 flex flex-col gap-4">
                    <input type="hidden" id="adj-item-code">
                    <input type="hidden" id="adj-location-code">
                    <div class="bg-orange-50 border border-orange-100 rounded-lg p-3">
                        <p class="text-xs font-bold text-orange-800 uppercase" id="adj-item-name"></p>
                        <p class="text-[10px] text-orange-600 font-mono mt-1">Stock Teórico Actual: <span
                                id="adj-current-stock" class="font-bold"></span> <span
                                id="adj-item-unit-display"></span></p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Stock Físico / Real Encontrado (<span
                                id="adj-item-unit"></span>)</label>
                        <input type="number" step="0.01" min="0" id="adj-real-stock" required
                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-orange-500 text-right font-mono text-lg font-bold text-orange-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Nota del Cierre (Opcional)</label>
                        <input type="text" id="adj-note" placeholder="Ej. Limones en mal estado"
                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div class="mt-4 flex justify-end gap-2">
                        <button type="button"
                            class="btn-close-adjustment px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">Cancelar</button>
                        <button type="submit"
                            class="px-4 py-2 text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 rounded-lg shadow-sm transition-colors">Ejecutar
                            Ajuste</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL: RECEPCIÓN DE MERCANCÍA (SYNC) -->
        <div id="modal-sync"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
            <div
                class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform scale-95 transition-transform duration-200">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <span class="material-symbols-outlined text-indigo-600 text-xl">inventory</span>
                        Recepción de Mercancía
                    </h3>
                    <button id="btn-close-sync-modal" class="text-slate-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="p-6 flex flex-col gap-4">
                    <p class="text-sm text-slate-600">Selecciona el archivo JSON de compra y asócialo al pedido que corresponda para registrar lo recibido.</p>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">PEDIDO DE COMPRA (opcional)</label>
                        <select id="sync-order-selector"
                            class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">Sin asociar — solo actualizar stock</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ARCHIVO DE COMPRA (.json)</label>
                        <input type="file" id="sync-file-input" accept=".json"
                            class="w-full text-sm text-slate-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                    </div>
                    <div class="mt-2 flex justify-end gap-2">
                        <button type="button" id="btn-cancel-sync"
                            class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">
                            Cancelar
                        </button>
                        <button type="button" id="btn-execute-sync"
                            class="px-4 py-2 text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg shadow-sm transition-colors flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-[16px]">save</span>
                            Registrar Recepción
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</template>
