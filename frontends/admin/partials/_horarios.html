<template id="tpl-admin-horarios">
    <div class="p-6 space-y-6 fade-in">

        <!-- ── HEADER ─────────────────────────────────────────── -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-violet-100 text-violet-600 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[22px]">calendar_month</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Horarios de Personal</h2>
                    <p class="text-sm text-slate-500">Asignación de turnos para cajeros, cocineros y staff no-piso</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-slate-400">
                <span class="material-symbols-outlined text-[16px]">info</span>
                Los meseros se gestionan desde el módulo de Piso
            </div>
        </div>

        <!-- ── FORMULARIO NUEVO HORARIO ──────────────────────── -->
        <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <h3 class="font-semibold text-slate-700 mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px] text-violet-500">add_circle</span>
                Asignar Nuevo Horario
            </h3>
            <form id="form-employee-schedule"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">

                <!-- Empleado -->
                <div class="lg:col-span-2">
                    <label for="sch-employee"
                        class="block text-xs font-medium text-slate-600 mb-1.5">
                        Empleado <span class="text-red-500">*</span>
                    </label>
                    <select id="sch-employee" required
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500
                               bg-white text-slate-800">
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <!-- Turno -->
                <div>
                    <label for="sch-shift"
                        class="block text-xs font-medium text-slate-600 mb-1.5">
                        Turno <span class="text-red-500">*</span>
                    </label>
                    <select id="sch-shift" required
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500
                               bg-white text-slate-800">
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <!-- Fecha inicio -->
                <div>
                    <label for="sch-date"
                        class="block text-xs font-medium text-slate-600 mb-1.5">
                        Fecha inicio <span class="text-red-500">*</span>
                    </label>
                    <input type="date" id="sch-date" required
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500" />
                </div>

                <!-- Recurrencia + Submit en la misma fila -->
                <div class="flex flex-col gap-2">
                    <label for="sch-recurrence"
                        class="block text-xs font-medium text-slate-600">
                        Recurrencia <span class="text-red-500">*</span>
                    </label>
                    <div class="flex gap-2">
                        <select id="sch-recurrence" required
                            class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm
                                   focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500
                                   bg-white text-slate-800">
                            <option value="DIA">Solo este día</option>
                            <option value="SEMANA" selected>Esta semana (7 días)</option>
                            <option value="MES">Este mes (30 días)</option>
                        </select>
                        <button type="submit"
                            class="bg-violet-600 hover:bg-violet-700 active:scale-95 text-white font-medium
                                   py-2 px-4 rounded-lg transition-all text-sm flex items-center gap-1 whitespace-nowrap">
                            <span class="material-symbols-outlined text-[16px]">add</span>
                            Asignar
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ── TABLA CON FILTRO ───────────────────────────────── -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">

            <!-- Filter bar -->
            <div class="p-4 border-b border-slate-100 flex flex-wrap items-center gap-3">
                <span class="text-sm font-semibold text-slate-700">Horarios programados</span>

                <div class="flex items-center gap-2 ml-auto flex-wrap">
                    <label class="text-xs text-slate-500">Filtrar por fecha:</label>
                    <input type="date" id="sch-filter-date"
                        class="border border-slate-200 rounded-lg px-2 py-1.5 text-xs
                               focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500" />
                    <button id="btn-sch-filter"
                        class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium
                               px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">search</span>
                        Filtrar
                    </button>
                    <button id="btn-sch-today"
                        class="bg-violet-50 hover:bg-violet-100 text-violet-700 text-xs font-medium
                               px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">today</span>
                        Hoy
                    </button>
                </div>
            </div>

            <!-- Stats bar (oculto hasta primer carga) -->
            <div id="sch-stats-bar"
                class="px-5 py-2.5 bg-slate-50 border-b border-slate-100
                       flex gap-5 text-xs items-center hidden">
                <span class="text-slate-600">
                    Total: <b id="sch-stat-total" class="text-slate-800">0</b>
                </span>
                <span class="text-emerald-600 font-medium">
                    ✓ Presente: <b id="sch-stat-present">0</b>
                </span>
                <span class="text-amber-600 font-medium">
                    ⏳ Esperado: <b id="sch-stat-expected">0</b>
                </span>
                <span class="text-red-500 font-medium">
                    ✗ Ausente: <b id="sch-stat-absent">0</b>
                </span>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-xs font-semibold text-slate-500 uppercase tracking-wide">
                        <tr>
                            <th class="px-4 py-3 text-left">Empleado</th>
                            <th class="px-4 py-3 text-left">Turno</th>
                            <th class="px-4 py-3 text-left">Horario</th>
                            <th class="px-4 py-3 text-left">Fecha</th>
                            <th class="px-4 py-3 text-left">Estado</th>
                            <th class="px-4 py-3 text-left">Check-in</th>
                            <th class="px-4 py-3 text-left">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="table-horarios-body" class="divide-y divide-slate-100">
                        <!-- Populated by HorariosController -->
                        <tr>
                            <td colspan="7"
                                class="px-4 py-10 text-center text-slate-400 text-sm">
                                <span class="material-symbols-outlined text-[32px] block mb-2 text-slate-300">
                                    calendar_today
                                </span>
                                Selecciona una fecha para ver los horarios programados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</template>
