<template id="tpl-modal-empleado">
    <div id="modal-edit-empleado"
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div
            class="bg-white rounded-2xl shadow-xl w-full max-w-md scale-95 transition-transform duration-300 overflow-hidden">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800">Editar Empleado</h3>
                <button type="button"
                    class="btn-close-modal text-slate-400 hover:text-slate-600 focus:outline-none"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <div class="p-6">
                <form id="form-edit-empleado" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">ID Empleado</label>
                        <input type="text" id="edit-emp-numero"
                            class="w-full px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 text-slate-500 font-medium"
                            readonly>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
                            <input type="text" id="edit-emp-nombre"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Apellidos</label>
                            <input type="text" id="edit-emp-apellidos"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                required>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Área</label>
                            <select id="edit-emp-area"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                required>
                                <option value="" disabled selected>Selecciona un área...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Puesto</label>
                            <select id="edit-emp-puesto"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500"
                                required></select>
                        </div>
                    </div>
                    <div class="flex items-center mt-4 p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="edit-emp-active" class="sr-only peer">
                            <div
                                class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500">
                            </div>
                            <span class="ml-3 text-sm font-semibold text-slate-700">Empleado Activo en el Sistema</span>
                        </label>
                    </div>
                    <div class="pt-4 flex gap-3">
                        <button type="button"
                            class="btn-close-modal flex-1 px-4 py-2 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition-colors">Cancelar</button>
                        <button type="submit" id="btn-submit-edit"
                            class="flex-1 px-4 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors flex justify-center items-center gap-2">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>
