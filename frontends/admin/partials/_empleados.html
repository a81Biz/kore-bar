<template id="tpl-admin-empleados">
    <div class="max-w-[1400px] mx-auto w-full fade-in">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 mb-1">Gestión de Empleados</h2>
                <p class="text-slate-500">Directorio y Sincronización de Recursos Humanos</p>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm mb-8 overflow-hidden">
            <div class="p-4 border-b border-slate-200 bg-slate-50">
                <h3 class="font-bold flex items-center gap-2 text-slate-800">
                    <span class="material-symbols-outlined text-indigo-600">sync_alt</span> Integración RRHH
                </h3>
            </div>
            <div class="p-6">
                <form id="form-hr-sync" class="flex gap-2 max-w-md">
                    <input type="file" id="input-hr-url" accept=".json"
                        class="flex-1 px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg outline-none" required>
                    <button type="submit" id="btn-hr-sync"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition flex items-center gap-2 font-medium text-sm">
                        <span class="material-symbols-outlined text-[18px]">sync</span> Sincronizar
                    </button>
                </form>
            </div>
        </div>
        <div id="mdm-stats-container"
            class="hidden flex items-center justify-between bg-slate-50 border border-slate-200 rounded-xl shadow-sm mb-4 p-4 transition-all">
            <div class="flex gap-4">
                <div class="px-3 py-1 rounded bg-green-100 text-green-800 text-sm font-semibold">✓ Al Día: <span
                        id="stat-saved">0</span></div>
                <div class="px-3 py-1 rounded bg-yellow-100 text-yellow-800 text-sm font-semibold">⚠️ Pendientes: <span
                        id="stat-pending">0</span></div>
                <div class="px-3 py-1 rounded bg-red-100 text-red-800 text-sm font-semibold">🗑️ Huérfanos: <span
                        id="stat-orphan">0</span></div>
            </div>
            <button id="btn-save-all"
                class="hidden bg-indigo-600 text-white px-4 py-1.5 rounded text-sm hover:bg-indigo-700 font-medium transition-colors shadow-sm">
                Guardar Todos (<span id="stat-pending-btn">0</span>)
            </button>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-200 bg-slate-50">
                <h3 class="font-bold flex items-center gap-2 text-slate-800">Directorio Activo</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-sm text-slate-600 font-medium">
                            <th class="p-4">ID Empleado</th>
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Área</th>
                            <th class="p-4">Puesto</th>
                            <th class="p-4">Estado</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-empleados-body" class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
        <!-- ── PANEL: Acceso a Caja por Área ─────────────────────────── -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mt-8">
            <div class="p-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
                <div>
                    <h3 class="font-bold flex items-center gap-2 text-slate-800">
                        <span class="material-symbols-outlined text-purple-600">point_of_sale</span>
                        Acceso a Caja y Facturación por Área
                    </h3>
                    <p class="text-xs text-slate-500 mt-0.5">
                        Las áreas con este permiso activo aparecen en el selector de login de la Caja.
                    </p>
                </div>
                <button id="btn-refresh-areas" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg
                   font-medium transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">refresh</span>
                    Actualizar
                </button>
            </div>

            <div id="list-areas-cashier" class="divide-y divide-slate-100">
                <!-- Populated by EmpleadosController via render.areasCashier() -->
                <div class="p-6 text-center text-slate-400 text-sm">Cargando áreas...</div>
            </div>
        </div>


    </div>
</template>

<template id="tpl-fila-empleado">
    <tr class="hover:bg-slate-50/50 transition-colors">
        <td class="col-id p-4 font-medium text-slate-800"></td>
        <td class="col-nombre p-4"></td>
        <td class="p-4"><span class="col-badge-area inline-flex px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        </td>
        <td class="col-puesto p-4 text-slate-600"></td>
        <td class="p-4"><span class="col-badge-estado px-2.5 py-1 text-xs font-semibold rounded-full border"></span>
        </td>
        <td class="p-4 text-right">
            <button class="btn-editar text-indigo-600 hover:text-indigo-800 p-2 rounded-lg hover:bg-indigo-50"
                title="Editar">
                <span class="material-symbols-outlined text-[20px]">edit</span>
            </button>
        </td>
    </tr>
</template>

<template id="tpl-fila-area-cashier">
    <div class="flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition-colors">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-slate-500 text-[18px]">corporate_fare</span>
            </div>
            <div>
                <p class="font-bold text-slate-800 text-sm col-area-name"></p>
                <p class="text-xs text-slate-400 font-mono col-area-code"></p>
            </div>
        </div>
        <label class="flex items-center gap-3 cursor-pointer group">
            <span class="text-xs font-medium text-slate-500 group-has-[input:checked]:text-purple-700
                         col-cashier-label">Sin acceso</span>
            <div class="relative">
                <input type="checkbox" class="sr-only peer toggle-cashier" data-code="" data-name="">
                <div class="w-11 h-6 bg-slate-200 peer-focus:ring-2 peer-focus:ring-purple-300
                            rounded-full peer transition-colors
                            peer-checked:bg-purple-600
                            after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                            after:bg-white after:rounded-full after:h-5 after:w-5
                            after:transition-all peer-checked:after:translate-x-full"></div>
            </div>
        </label>
    </div>
</template>
