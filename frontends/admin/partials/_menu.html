<template id="tpl-admin-menu">
    <div class="max-w-[1400px] mx-auto w-full fade-in pb-12">
        <div class="flex items-start justify-between mb-8 border-b border-slate-200 pb-4">
            <h2 class="text-3xl font-bold text-slate-800 mb-1">Gestión de Menú</h2>
            <div class="text-right bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">
                <div class="text-xs text-slate-500 font-medium uppercase tracking-widest">Catálogo</div>
                <div class="text-xl font-bold text-slate-800 tabular-nums">Comercial</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <div
                class="lg:col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[650px]">
                <div class="p-4 border-b border-slate-200 bg-slate-50">
                    <h3 class="font-bold text-slate-700">1. Categorías</h3>
                </div>
                <div class="p-4 border-b border-slate-100 bg-white">
                    <form id="form-menu-categoria" class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="text" id="cat-code"
                                class="w-24 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg uppercase focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="Cod (BEB)" required maxlength="20">
                            <input type="text" id="cat-name"
                                class="flex-1 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="Nombre (Ej. Bebidas)" required>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="cat-desc"
                                class="flex-1 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="Descripción breve...">
                            <button type="submit"
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-1 font-medium shrink-0">
                                <span class="material-symbols-outlined text-[18px]">add</span>
                                <span>Añadir</span>
                            </button>
                        </div>
                    </form>
                </div>
                <ul id="list-categorias" class="flex-1 overflow-y-auto p-2 space-y-1 bg-slate-50/50"></ul>
            </div>

            <div
                class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[650px]">
                <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center gap-4">
                    <h3 class="font-bold text-slate-700">2. Platillos</h3>
                    <select id="filtro-platillo-categoria"
                        class="w-64 px-3 py-1.5 text-sm bg-white border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 font-medium text-slate-700">
                        <option value="" disabled selected>Filtrar por Categoría...</option>
                        <option value="ALL">Mostrar Todos</option>
                    </select>
                </div>

                <div class="p-4 border-b border-slate-100 bg-white">
                    <form id="form-menu-platillo" class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <select id="plat-category"
                                class="w-1/3 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500"
                                required>
                                <option value="" disabled selected>Selecciona Categoría...</option>
                            </select>
                            <input type="text" id="plat-code"
                                class="w-28 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg uppercase outline-none focus:ring-2 focus:ring-emerald-500"
                                placeholder="ID (PL-01)" required>
                            <input type="text" id="plat-name"
                                class="flex-1 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500"
                                placeholder="Nombre del Platillo" required>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="plat-desc"
                                class="flex-1 px-3 py-2 text-sm bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500"
                                placeholder="Descripción para el cliente...">
                            <input type="number" id="plat-price" min="0" step="0.50"
                                class="w-32 px-3 py-2 text-sm bg-emerald-50 border border-emerald-200 text-emerald-900 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 font-bold placeholder:font-normal"
                                placeholder="$ Precio" required>
                            <button type="submit"
                                class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-1 font-medium shrink-0">
                                <span class="material-symbols-outlined text-[18px]">add</span>
                                <span>Guardar</span>
                            </button>
                        </div>
                    </form>
                </div>
                <div id="list-platillos"
                    class="flex-1 overflow-y-auto p-4 bg-slate-50/50 grid grid-cols-1 md:grid-cols-2 gap-3 content-start">
                </div>
            </div>

        </div>
        
        <!-- DRAWER REVISIÓN COMERCIAL -->
        <div id="modal-dish-review" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex justify-end transition-opacity opacity-0">
            <div class="w-full max-w-2xl bg-white h-full shadow-2xl flex flex-col transform translate-x-full transition-transform duration-300" id="drawer-dish-review">
                <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800" id="review-dish-title">Revisión Comercial</h3>
                        <p class="text-sm text-slate-500" id="review-dish-subtitle">ID: ---</p>
                    </div>
                    <button type="button" class="btn-close-review text-slate-400 hover:text-red-500 p-2 rounded-full hover:bg-slate-200 transition-colors">
                        <span class="material-symbols-outlined leading-none">close</span>
                    </button>
                </div>
                
                <div class="flex border-b border-slate-200 bg-white shrink-0 px-6 mt-0">
                    <button id="tab-review-comercial" class="py-3 px-4 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors">
                        Marketing y Precio
                    </button>
                    <button id="tab-review-tecnica" class="py-3 px-4 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors">
                        Receta Técnica (BOM)
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-6 bg-slate-50 relative">
                    <!-- Tab Comercial -->
                    <form id="form-review-comercial" class="space-y-5">
                        <input type="hidden" id="rev-code">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Comercial</label>
                                <input type="text" id="rev-name" class="w-full px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Categoría</label>
                                <select id="rev-category" class="w-full px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required></select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Descripción para el Cliente</label>
                            <textarea id="rev-desc" class="w-full px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-20"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Precio de Venta ($)</label>
                                <input type="number" id="rev-price" min="0" step="0.50" class="w-full px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-emerald-700" required>
                            </div>
                            <div class="flex items-end">
                                <label class="flex items-center gap-2 cursor-pointer bg-white border border-slate-300 px-4 py-2 rounded-lg w-full justify-center hover:bg-slate-50 transition-colors">
                                    <input type="checkbox" id="rev-active" class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
                                    <span class="text-sm font-bold text-slate-700">Platillo Activo en Menú</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fotografía del Platillo (Mkt)</label>
                            <div class="flex items-start gap-4">
                                <label class="relative flex flex-col items-center justify-center w-32 h-32 border-2 border-slate-300 border-dashed rounded-lg cursor-pointer bg-white hover:bg-slate-50 overflow-hidden group shrink-0">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6 z-10" id="rev-img-placeholder">
                                        <span class="material-symbols-outlined text-slate-400 text-2xl mb-1">add_a_photo</span>
                                        <p class="text-[10px] text-slate-500 font-medium px-2 text-center text-balance">Reemplazar Foto de Cocina</p>
                                    </div>
                                    <img id="rev-img-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                                    <input id="rev-img-upload" type="file" class="hidden" accept="image/*" />
                                </label>
                                <div class="flex-1 text-[11px] text-slate-500 space-y-2 pt-2">
                                    <p>Admin puede reemplazar la fotografía de referencia tomada por la cocina con una imagen profesional de estudio.</p>
                                    <p class="text-amber-700 bg-amber-50 p-2 rounded border border-amber-200">El candado comercial impide ver y alterar las cantidades de los insumos en el formulario para proteger el Kardex y Costeo.</p>
                                </div>
                            </div>
                        </div>
                    </form>

                    <!-- Tab Técnica (Solo Lectura) -->
                    <div id="view-review-tecnica" class="hidden space-y-6">
                        <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm">
                            <h4 class="text-xs font-bold text-slate-500 uppercase flex items-center gap-1 mb-3">
                                <span class="material-symbols-outlined text-[16px]">blender</span>
                                Método de Preparación (Chef)
                            </h4>
                            <div id="rev-tech-method" class="text-sm text-slate-700 whitespace-pre-wrap bg-slate-50 p-3 rounded-lg border border-slate-100 min-h-[60px] italic"></div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                            <h4 class="text-xs font-bold text-slate-500 uppercase flex items-center justify-between p-4 bg-slate-50 border-b border-slate-200">
                                <div class="flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[16px]">receipt_long</span>
                                    Receta Matemática (BOM)
                                </div>
                                <span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-[10px]">Solo Lectura</span>
                            </h4>
                            <table class="w-full text-sm text-left">
                                <thead class="text-xs text-slate-500 uppercase bg-white border-b border-slate-100">
                                    <tr>
                                        <th class="px-4 py-3">Insumo</th>
                                        <th class="px-4 py-3 text-right">Cant / Und</th>
                                    </tr>
                                </thead>
                                <tbody id="rev-bom-list" class="divide-y divide-slate-50">
                                </tbody>
                            </table>
                            <div id="rev-bom-empty" class="p-4 text-center text-sm text-slate-500 hidden">
                                La cocina aún no ha dictado la receta para este platillo.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-6 border-t border-slate-200 bg-white flex justify-end gap-3 shrink-0" id="review-footer-actions">
                    <button type="button" class="btn-close-review px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" form="form-review-comercial" id="btn-save-review" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold transition-colors flex items-center gap-2 shadow-sm">
                        <span class="material-symbols-outlined text-[18px]">save</span>
                        Guardar Cambios Comerciales
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>

<template id="tpl-item-categoria">
    <li
        class="flex items-center justify-between p-3 bg-white hover:bg-slate-50 rounded-lg shadow-sm border border-slate-100 group transition-colors mb-1">
        <div class="flex items-center gap-3">
            <div class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded code-badge"></div>
            <div>
                <div class="col-nombre text-sm font-bold text-slate-800"></div>
                <div class="col-desc text-xs text-slate-500 font-medium mt-0.5 line-clamp-1"></div>
            </div>
        </div>
        <button class="btn-eliminar text-slate-300 hover:text-red-500 transition-colors p-1" title="Borrar">
            <span class="material-symbols-outlined text-[20px]">delete</span>
        </button>
    </li>
</template>

<template id="tpl-item-platillo">
    <div
        class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-xl hover:shadow-md transition-shadow relative group">
        <div
            class="w-16 h-16 bg-slate-100 rounded-lg flex items-center justify-center shrink-0 border border-slate-200">
            <span class="material-symbols-outlined text-slate-400 text-3xl">restaurant</span>
        </div>
        <div class="flex-1 min-w-0 pr-6">
            <div class="flex justify-between items-start mb-1">
                <span
                    class="col-categoria bg-slate-100 text-slate-600 font-mono text-[10px] font-bold px-1.5 py-0.5 rounded uppercase"></span>
                <span class="col-precio font-bold text-emerald-700 text-sm bg-emerald-50 px-2 rounded"></span>
            </div>
            <p class="col-nombre font-bold text-slate-800 text-sm leading-tight mb-1 truncate"></p>

            <div
                class="col-receta-status text-[10px] font-bold px-1.5 py-0.5 rounded w-fit flex items-center gap-1 mb-1.5 transition-colors">
            </div>

            <p class="col-desc text-xs text-slate-500 line-clamp-2 leading-relaxed"></p>
        </div>
        <button
            class="btn-editar absolute top-2 right-8 text-slate-300 hover:text-blue-500 p-1 bg-white rounded opacity-0 group-hover:opacity-100 transition-opacity"
            title="Revisión Comercial">
            <span class="material-symbols-outlined text-[18px]">edit</span>
        </button>
        <button
            class="btn-eliminar absolute top-2 right-2 text-slate-300 hover:text-red-500 p-1 bg-white rounded opacity-0 group-hover:opacity-100 transition-opacity"
            title="Eliminar Platillo">
            <span class="material-symbols-outlined text-[18px]">delete</span>
        </button>
    </div>
</template>
