<template id="tpl-kitchen-modal-pin">
    <!--
        Panel Checador — Flotante inferior-derecho.
        No usa backdrop para no tapar el KDS.
        Se muestra/oculta con la clase 'hidden'.
        Controlado por: pin-checador.js
    -->
    <div id="modal-fast-pin" class="hidden fixed bottom-4 right-4 z-50 w-72 bg-slate-800 border border-slate-600
                rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 bg-slate-700/80 border-b border-slate-600">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-amber-400 text-[18px]">fingerprint</span>
                <span class="text-sm font-bold text-white">Checador de Entrada</span>
            </div>
            <button id="btn-close-pin-modal"
                class="text-slate-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-slate-600">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </button>
        </div>

        <!-- Body -->
        <div class="p-4 space-y-4">

            <!-- Selector de empleado -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">
                    Empleado
                </label>
                <select id="pin-emp-select" class="w-full px-3 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg
                               outline-none focus:ring-2 focus:ring-amber-500 text-sm font-medium
                               cursor-pointer appearance-none">
                    <option value="" disabled selected>Cargando...</option>
                </select>
            </div>

            <!-- PIN dots -->
            <div class="flex justify-center gap-3 py-1">
                <div class="pin-dot w-3 h-3 rounded-full border-2 border-slate-500 transition-colors" data-pos="1">
                </div>
                <div class="pin-dot w-3 h-3 rounded-full border-2 border-slate-500 transition-colors" data-pos="2">
                </div>
                <div class="pin-dot w-3 h-3 rounded-full border-2 border-slate-500 transition-colors" data-pos="3">
                </div>
                <div class="pin-dot w-3 h-3 rounded-full border-2 border-slate-500 transition-colors" data-pos="4">
                </div>
            </div>

            <!-- Numpad 3x4 -->
            <div class="grid grid-cols-3 gap-2" id="pin-numpad">
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="1">1</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="2">2</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="3">3</button>

                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="4">4</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="5">5</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="6">6</button>

                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="7">7</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="8">8</button>
                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="9">9</button>

                <!-- Borrar -->
                <button class="btn-numpad text-slate-400 hover:text-red-400 text-lg font-bold
                               py-3 rounded-xl transition-colors flex items-center justify-center" data-val="clear">
                    <span class="material-symbols-outlined text-[22px]">backspace</span>
                </button>

                <button class="btn-numpad bg-slate-700 hover:bg-slate-600 active:bg-amber-500
                               text-white text-lg font-bold py-3 rounded-xl transition-colors" data-val="0">0</button>

                <!-- Confirmar -->
                <button id="btn-submit-pin" class="bg-emerald-600 hover:bg-emerald-500 text-white text-lg font-bold
                               py-3 rounded-xl transition-colors flex items-center justify-center
                               disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    <span class="material-symbols-outlined text-[22px]">check_circle</span>
                </button>
            </div>

        </div>
    </div>
</template>
