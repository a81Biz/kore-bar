# ============================================================
# deploy.yml — Kore Bar CI/CD Pipeline
# Ejecuta en cada push a main:
#   1. setup-lint  → Instalar deps + lint
#   2. test        → Vitest contra PostgreSQL efímero (gatekeeper)
#   3. migrate-db  → psql contra Supabase (producción)
#   4. deploy      → Cloudflare Workers (API) + Pages (6 frontends)
# ============================================================

name: 🚀 Deploy Kore Bar

on:
  push:
    branches: [main]

# ── Variables reutilizables ──────────────────────────────────
env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Setup & Linting
  # ────────────────────────────────────────────────────────────
  setup-lint:
    name: 📦 Setup & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Placeholder: agregar ESLint cuando esté configurado
      # - name: Run ESLint
      #   working-directory: backend
      #   run: npx eslint src/

      - name: Lint check (syntax validation)
        working-directory: backend
        run: node --check src/index.js

  # ────────────────────────────────────────────────────────────
  # JOB 2: Testing (Gatekeeper) — con PostgreSQL efímero
  # ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (Gatekeeper)
    runs-on: ubuntu-latest
    needs: setup-lint

    # ── Service Container: PostgreSQL temporal ──────────────
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kore_ci
          POSTGRES_PASSWORD: kore_ci_pass
          POSTGRES_DB: kore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kore_ci -d kore_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://kore_ci:kore_ci_pass@localhost:5432/kore_test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # ── Preparar esquema en la BD efímera ──────────────────
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run migrations on ephemeral DB
        run: psql "$DATABASE_URL" -f backend/db/run_all.sql

      # ── Ejecutar tests ─────────────────────────────────────
      - name: Run Vitest
        working-directory: backend
        run: npm test

  # ────────────────────────────────────────────────────────────
  # JOB 3: Migración de Base de Datos (Supabase — producción)
  # ────────────────────────────────────────────────────────────
  migrate-db:
    name: 🗄️ Migrate DB (Supabase)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run migrations via psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: psql "$SUPABASE_DB_URL" -f backend/db/run_all.sql

  # ────────────────────────────────────────────────────────────
  # JOB 4: Deploy a Cloudflare
  # ────────────────────────────────────────────────────────────
  deploy:
    name: ☁️ Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # ── Deploy Backend (Cloudflare Worker) ──────────────────
      - name: Deploy API Worker
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # ── Deploy Frontends (Cloudflare Pages × 6) ────────────
      # ── 1. Empaquetar recursos compartidos (Core y Shared) ────────────
      - name: Prepare Frontend Assets
        run: |
          for dir in admin menu waiters kitchen cashier invoice; do
            mkdir -p frontends/$dir/core frontends/$dir/shared
            cp -a frontends/core/. frontends/$dir/core/
            cp -a frontends/shared/. frontends/$dir/shared/
          done

          mkdir -p build_portal/core build_portal/shared
          cp -a frontends/core/. build_portal/
          cp -a frontends/core/. build_portal/core/
          cp -a frontends/shared/. build_portal/shared/

      # ── 2. Deploy PORTAL MAESTRO (El Dashboard Raíz) ────────────
      - name: Deploy Portal Maestro (Core)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-portal --production-branch main || true
          npx wrangler pages deploy build_portal --project-name=kore-portal

      # ── 3. Deploy de los 6 Micrositios ────────────
      - name: Deploy Admin frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-admin --production-branch main || true
          npx wrangler pages deploy frontends/admin --project-name=kore-admin

      - name: Deploy Menu frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-menu --production-branch main || true
          npx wrangler pages deploy frontends/menu --project-name=kore-menu

      - name: Deploy Waiters frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-waiters --production-branch main || true
          npx wrangler pages deploy frontends/waiters --project-name=kore-waiters

      - name: Deploy Kitchen frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-kitchen --production-branch main || true
          npx wrangler pages deploy frontends/kitchen --project-name=kore-kitchen

      - name: Deploy Cashier frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-cashier --production-branch main || true
          npx wrangler pages deploy frontends/cashier --project-name=kore-cashier

      - name: Deploy Invoice frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create kore-invoice --production-branch main || true
          npx wrangler pages deploy frontends/invoice --project-name=kore-invoice
