<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRM - Archivo del Proyecto</title>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #172b4d;
            --text-muted: #5e6c84;
            --border: #dfe1e6;
            --primary: #0052cc;
            --done-bg: #e3fcef;
            --done-text: #006644;
            --todo-bg: #ebecf0;
            --todo-text: #42526e;
            --epic-bg: #e9e5ff;
            --epic-text: #403294;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .header { max-width: 900px; margin: 0 auto 20px auto; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Estilos del Acordeón de Épicas */
        details.epic-group {
            margin-bottom: 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        summary.epic-header {
            padding: 15px 20px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            background-color: #fcfcfc;
            border-radius: 5px;
            list-style: none; /* Oculta la flecha por defecto */
            display: flex;
            align-items: center;
            border-bottom: 1px solid transparent;
        }
        summary.epic-header::-webkit-details-marker { display: none; }
        summary.epic-header::before {
            content: '▶';
            font-size: 0.8em;
            color: var(--text-muted);
            margin-right: 15px;
            transition: transform 0.2s;
        }
        details[open] > summary.epic-header {
            border-bottom-color: var(--border);
            border-radius: 5px 5px 0 0;
        }
        details[open] > summary.epic-header::before { content: '▼'; }
        
        .epic-tag {
            background: var(--epic-bg);
            color: var(--epic-text);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-right: 10px;
        }

        /* Estilos de las Historias */
        .epic-content { padding: 20px; background: #fafbfc; }
        .issue-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .issue-card:last-child { margin-bottom: 0; }
        .issue-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px;
        }
        .issue-title { font-size: 1.1em; font-weight: 600; margin: 0; }
        .issue-key { color: var(--text-muted); font-size: 0.9em; margin-right: 10px; }
        .badge { padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-done { background: var(--done-bg); color: var(--done-text); }
        .badge-todo { background: var(--todo-bg); color: var(--todo-text); }
        
        .description { margin-bottom: 20px; font-size: 0.95em; }
        .description img { max-width: 100%; height: auto; }
        
        .comments-section {
            background-color: #f4f5f7; border: 1px solid var(--border);
            padding: 15px; border-radius: 4px;
        }
        .comment { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .comment:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-header { display: flex; align-items: center; margin-bottom: 8px; }
        .comment-author { font-weight: bold; font-size: 0.9em; margin-right: 10px; }
        .comment-date { font-size: 0.8em; color: var(--text-muted); }
        .comment-body { font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sistema Gestión Restaurante Mexicano (SGRM)</h1>
        <p>Archivo histórico estructurado por Épicas</p>
    </div>

    <div class="container" id="issues-container">
        <p style="text-align:center;">Cargando repositorio...</p>
    </div>

    <script>
        // Generador de HTML para una tarjeta de historia
        function createIssueHTML(issue) {
            const key = issue.key;
            const summary = issue.fields.summary || 'Sin título';
            const status = issue.fields.status.name;
            const statusClass = status.toLowerCase().includes('finalizada') || status.toLowerCase().includes('listo') ? 'badge-done' : 'badge-todo';
            const description = issue.renderedFields.description || '<i>Sin descripción</i>';
            
            let commentsHtml = '';
            if (issue.renderedFields.comment && issue.renderedFields.comment.comments.length > 0) {
                commentsHtml = `<div class="comments-section"><h4 style="margin-top:0;">Resolución y Comentarios (${issue.renderedFields.comment.comments.length})</h4>`;
                issue.renderedFields.comment.comments.forEach(c => {
                    commentsHtml += `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-author">${c.author.displayName}</span>
                                <span class="comment-date">${c.created}</span>
                            </div>
                            <div class="comment-body">${c.body}</div>
                        </div>
                    `;
                });
                commentsHtml += `</div>`;
            }

            return `
                <div class="issue-card">
                    <div class="issue-header">
                        <div class="issue-title"><span class="issue-key">${key}</span> ${summary}</div>
                        <span class="badge ${statusClass}">${status}</span>
                    </div>
                    <div class="description">${description}</div>
                    ${commentsHtml}
                </div>
            `;
        }

        async function loadProjectData() {
            const container = document.getElementById('issues-container');
            try {
                const response = await fetch('sgrm_completo.json');
                const data = await response.json();
                
                const epics = {};
                const orphans = [];

                // 1. Identificar las Épicas (Por el texto EP- en el título o por issuetype)
                data.issues.forEach(issue => {
                    if (issue.fields.summary.startsWith('EP-') || (issue.fields.issuetype && issue.fields.issuetype.name === 'Epic')) {
                        epics[issue.key] = { data: issue, stories: [] };
                    }
                });

                // 2. Asignar las Historias a sus Épicas
                data.issues.forEach(issue => {
                    if (epics[issue.key]) return; // Si es épica, la ignoramos aquí

                    // Buscar quién es el padre (Jira usa 'parent' o 'customfield_10014' para enlazar a épicas)
                    let parentKey = null;
                    if (issue.fields.parent) parentKey = issue.fields.parent.key;
                    else if (issue.fields.customfield_10014) parentKey = issue.fields.customfield_10014;

                    if (parentKey && epics[parentKey]) {
                        epics[parentKey].stories.push(issue);
                    } else {
                        orphans.push(issue); // Si no tiene épica o no se detectó
                    }
                });

                // 3. Renderizar el HTML
                let html = '';
                
                // Renderizar Épicas con sus acordeones
                Object.values(epics).forEach(epicObj => {
                    const epicKey = epicObj.data.key;
                    const epicSummary = epicObj.data.fields.summary;
                    const count = epicObj.stories.length;
                    
                    let storiesHtml = epicObj.stories.length > 0 
                        ? epicObj.stories.map(story => createIssueHTML(story)).join('') 
                        : '<p style="color:#5e6c84; font-style:italic;">No hay historias registradas en esta épica.</p>';

                    html += `
                        <details class="epic-group">
                            <summary class="epic-header">
                                <span class="epic-tag">${epicKey}</span> 
                                <span>${epicSummary} (${count} historias)</span>
                            </summary>
                            <div class="epic-content">
                                ${storiesHtml}
                            </div>
                        </details>
                    `;
                });

                // Renderizar Tareas Huérfanas (Si hay alguna que no se vinculó a una épica)
                if (orphans.length > 0) {
                    let orphansHtml = orphans.map(story => createIssueHTML(story)).join('');
                    html += `
                        <details class="epic-group">
                            <summary class="epic-header">
                                <span class="epic-tag">Otras</span> 
                                <span>Tareas sin Épica asignada (${orphans.length})</span>
                            </summary>
                            <div class="epic-content">
                                ${orphansHtml}
                            </div>
                        </details>
                    `;
                }

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div style="color:red; text-align:center;">Error al procesar los datos. Recuerda levantar el servidor local.</div>`;
            }
        }

        loadProjectData();
    </script>
</body>
</html>
