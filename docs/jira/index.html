<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRM - Archivo del Proyecto</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="header">
        <h1>Sistema Gestión Restaurante Mexicano (SGRM)</h1>
        <p style="color:var(--text-muted); font-size:0.9em; margin-top:0;">Archivo Histórico de Solo Lectura</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab-epics')">Desglose por Épicas</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-sprints')">Tableros de Sprints</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-timeline')">Cronograma</button>
        </div>

        <div id="loading" style="text-align:center; padding: 50px;">Cargando repositorio de datos...</div>

        <div id="tab-epics" class="tab-content active"></div>
        <div id="tab-sprints" class="tab-content"></div>
        <div id="tab-timeline" class="tab-content"></div>
    </div>

    <div id="issueModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body">
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
