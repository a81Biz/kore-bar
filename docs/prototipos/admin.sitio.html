                                        { name: 'Carlos L.', role: 'Mesero B', img: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDPYaJaVfEUKpBMPnjiCxAPSP69-IWIY2U9WNk4P7zsIC4j4K5yA_m0PAVDMrumtcp1tHhF-QX1iUCuqsxabhqmZY_J-xwjzDCfhOm8iR6Szgqjwv3STGwrdKSMaDv6rjayUt8LJJebnSFqffFq16nip9g6Lv7e4jHblROpN8Q0LKcJTjUxpcVieehO1GQAF23PK_ZLudYNZLEgTVTBosfeI8tHlURqC-05jyD7ANGGkwJ4I_jY1RZJ_ibe9ccu6ThEH1hh1Itkl9n7' }

                                        <div key={i} onClick={() => setSelectedWaiter(emp.name)} class={`p-6 flex items-center justify-between cursor-pointer transition-colors ${selectedWaiter === emp.name ? 'bg-primary/5' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50'}`}>
                                            <div class="flex items-center gap-4">
                                                <div class="size-12 rounded-full border-2 border-slate-200 dark:border-slate-700 overflow-hidden">

                                    <div class="flex items-center gap-4">
                                        <div class="flex-1 font-bold text-slate-700 dark:text-slate-300">Editando: <span class="text-primary">{selectedWaiter}</span></div>
                                        <button class="bg-primary text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/20">Guardar Cambios</button>
                                    </div>
                                </div>
                                <div class="p-6 bg-slate-50/50 dark:bg-slate-800/20">
                                    <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                        {Array.from({length: 20}, (_, i) => i + 1).map(num => (
                                            <div key={num} onClick={() => toggleTable(num)} className={`h-16 flex flex-col items-center justify-center border-2 rounded-xl transition-all cursor-pointer relative ${assignedTables.includes(num) ? 'border-primary bg-primary/5 text-primary' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900'}`}>
                                                <span class="text-[10px] font-bold">Mesa</span>
                                                <span class="text-xl font-black">{num}</span>

        const InventoryPage = () => (
            <div class="flex-1 flex flex-col overflow-hidden">
                <TopBar />
                <main class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar">
                    <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Gestión de Inventario</h2>
                            <p class="text-slate-500 dark:text-slate-400 mt-1">Supervisa niveles de stock y genera pedidos a proveedores.</p>
                        </div>
                        <button class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-primary/20">
                            <span class="material-symbols-outlined">add_circle</span><span>Nuevo Insumo</span>
                        </button>
                    </header>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                            { label: 'Insumos Bajos', val: '2', icon: 'error', color: 'red', trend: '+15% vs ayer' },
                            { label: 'Pedidos Pendientes', val: '5', icon: 'pending_actions', color: 'primary', trend: 'Sin cambios' },
                            { label: 'Total Proveedores', val: '12', icon: 'group', color: 'blue', trend: 'Activos' }
                        ].map((stat, i) => (
                            <div key={i} class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                <div class="flex items-center justify-between mb-2">
                                    <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider">{stat.label}</p>
                                    <span className={`material-symbols-outlined ${stat.color === 'primary' ? 'text-primary bg-primary/10' : `text-${stat.color}-500 bg-${stat.color}-100 dark:bg-${stat.color}-900/30`} p-2 rounded-lg`}>{stat.icon}</span>
                                </div>
                                <div class="flex items-end gap-3"><p class="text-4xl font-black">{stat.val}</p><p className={`text-${stat.color === 'primary' ? 'primary' : stat.color}-500 text-sm font-medium mb-1`}>{stat.trend}</p></div>
                            </div>
                        ))}
                    </div>
                    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Insumo</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Categoría</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Stock Actual</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Stock Ideal</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Proveedor</th>
                                    <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                                <tr class="bg-red-50 dark:bg-red-900/20">
                                    <td class="px-6 py-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-red-600">kebab_dining</span><div><span class="block font-bold text-red-700 text-[10px]">ALERTA</span><span class="font-bold">Carne de Res</span></div></div></td>
                                    <td class="px-6 py-4"><span class="px-3 py-1 bg-slate-200 dark:bg-slate-700 text-xs font-bold rounded-full">Proteínas</span></td>
                                    <td class="px-6 py-4 font-black text-red-600">5kg</td>
                                    <td class="px-6 py-4">30kg</td>
                                    <td class="px-6 py-4">Carnes San Juan</td>
                                    <td class="px-6 py-4 text-right"><button class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Generar Pedido</button></td>
                                </tr>
                                <tr>
                                    <td class="px-6 py-4 font-bold">Tortillas</td>
                                    <td class="px-6 py-4"><span class="px-3 py-1 bg-slate-200 dark:bg-slate-700 text-xs font-bold rounded-full">Abarrotes</span></td>
                                    <td class="px-6 py-4 font-bold text-emerald-600">50kg</td>
                                    <td class="px-6 py-4">60kg</td>
                                    <td class="px-6 py-4">Tortillería La Fe</td>
                                    <td class="px-6 py-4 text-right"><button class="text-primary font-bold">Editar</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        );

        // --- Main App ---

        const App = () => {
            return (
                <div class="flex h-screen overflow-hidden">
                    <Sidebar />
                    <Routes>
                        <Route path="/" element={<DashboardPage />} />
                        <Route path="/menu" element={<MenuPage />} />
                        <Route path="/staff" element={<StaffPage />} />
                        <Route path="/inventory" element={<InventoryPage />} />
                        <Route path="/reports" element={<DashboardPage />} /> {/* Simplified for demo */}
                    </Routes>
                </div>
            );
        };

        const Root = () => (
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<Root />);
    </script>
</body>
