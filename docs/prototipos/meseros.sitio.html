                    return [...prev, { ...item, qty: 1 }];

                            </div>
                            <div className="relative w-64">
                                <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                                <input className="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Buscar platillo..." type="text" />
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-xl">
                                <span className="material-symbols-outlined text-primary text-sm">person</span>
                                <span className="text-sm font-medium">Juan P.</span>
                            </div>
                            <button onClick={() => navigate("/dashboard")} className="flex items-center justify-center rounded-xl h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex flex-1 overflow-hidden">
                        <section className="flex-[0.7] flex flex-col bg-background-light dark:bg-background-dark p-6 overflow-y-auto">
                            <div className="flex gap-3 mb-6 shrink-0 overflow-x-auto pb-2">
                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.id)}
                                        className={`px-6 py-2.5 rounded-xl font-bold text-sm shadow-md flex items-center gap-2 transition-all ${activeCategory === cat.id ? 'bg-primary text-white shadow-primary/20' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:bg-slate-50'
                                            }`}
                                    >
                                        <span className="material-symbols-outlined text-lg">{cat.icon}</span> {cat.id}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {MENU_ITEMS.filter(item => item.category === activeCategory).map(item => (
                                    <div
                                        key={item.id}
                                        onClick={() => addToCart(item)}
                                        className="group bg-white dark:bg-slate-800 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-95"
                                    >
                                        <div className="relative h-32 w-full bg-slate-200 dark:bg-slate-700">
                                            <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${item.img})` }}></div>
                                            <div className={`absolute top-2 right-2 p-1 rounded-lg ${item.location === 'Cocina' ? 'bg-primary/90' : 'bg-blue-500/90'} text-white`}>
                                                <span className="material-symbols-outlined text-sm block">
                                                    {item.location === 'Cocina' ? 'soup_kitchen' : 'kitchen'}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="p-3">
                                            <h3 className="font-bold text-sm leading-tight group-hover:text-primary transition-colors">{item.name}</h3>
                                            <div className="flex items-center justify-between mt-2">
                                                <span className="text-primary font-bold">${item.price.toFixed(2)}</span>
                                                <span className="text-[10px] uppercase font-bold text-slate-400">{item.location}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <aside className="flex-[0.3] flex flex-col bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 dark:border-slate-800">
                                <div className="flex items-center justify-between mb-1">
                                    <h2 className="text-xl font-bold">Mesa 4</h2>
                                    <span className="px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded-lg uppercase">Comanda #1240</span>
                                </div>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Viernes, 24 May 2024 • 14:35</p>
                            </div>

                            <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                {cart.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 dark:text-slate-700 italic text-center">
                                        <span className="material-symbols-outlined text-6xl mb-2">shopping_basket</span>
                                        <p>La orden está vacía</p>
                                    </div>
                                ) : (
                                    cart.map(item => (
                                        <div key={item.id} className="flex items-start gap-4 fade-in">
                                            <div className="flex flex-col items-center">
                                                <button onClick={() => updateQty(item.id, 1)} className="w-6 h-6 rounded bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:text-primary">
                                                    <span className="material-symbols-outlined text-sm">add</span>
                                                </button>
                                                <span className="font-bold py-1">{item.qty}</span>
                                                <button onClick={() => updateQty(item.id, -1)} className="w-6 h-6 rounded bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:text-primary">
                                                    <span className="material-symbols-outlined text-sm">remove</span>
                                                </button>
                                            </div>
                                            <div className="flex-1">
                                                <div className="flex justify-between font-medium text-sm">
                                                    <span>{item.name}</span>
                                                    <span>${(item.price * item.qty).toFixed(2)}</span>
                                                </div>
                                                <p className="text-xs text-slate-500 dark:text-slate-400">Standard prep.</p>
                                            </div>
                                            <button onClick={() => removeItem(item.id)} className="text-slate-300 hover:text-red-500">
                                                <span className="material-symbols-outlined text-lg">delete</span>
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>

                            <div className="p-6 bg-slate-50 dark:bg-slate-800/50 space-y-3">
                                <div className="flex justify-between text-sm text-slate-600 dark:text-slate-400">
                                    <span>Subtotal</span>
                                    <span>${subtotal.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-sm text-slate-600 dark:text-slate-400">
                                    <span>IVA (16%)</span>
                                    <span>${tax.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-xl font-bold pt-2 border-t border-slate-200 dark:border-slate-700">
                                    <span>Total</span>
                                    <span className="text-primary">${total.toFixed(2)}</span>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mt-6">
                                    <button className="py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-bold text-sm bg-white dark:bg-slate-800 hover:bg-slate-50">Imp. Ticket</button>
                                    <button className="py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-bold text-sm bg-white dark:bg-slate-800 hover:bg-slate-50">Descuento</button>
                                </div>
                                <button
                                    onClick={sendToKitchen}
                                    disabled={cart.length === 0}
                                    className={`w-full py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 mt-4 active:scale-[0.98] transition-all ${cart.length > 0 ? 'bg-primary text-white shadow-primary/30' : 'bg-slate-300 dark:bg-slate-700 text-slate-500 cursor-not-allowed'}`}
                                >
                                    <span className="material-symbols-outlined">send</span> Enviar Orden a Cocina
                                </button>
                            </div>
                        </aside>
                    </main>
                </div>
            );
        };

        // --- App Shell ---
        const App = () => {
            return (
                <MemoryRouter>
                    <Layout>
                        <Routes>
                            <Route path="/" element={<LoginScreen />} />
                            <Route path="/dashboard" element={<DashboardScreen />} />
                            <Route path="/order" element={<OrderScreen />} />
                        </Routes>
                    </Layout>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
